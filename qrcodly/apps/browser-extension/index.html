<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=470,initial-scale=1" />
		<title>QRcodly</title>
		<style>
			body {
				margin: 0;
				background: #ffffff;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
			}
			#splash {
				width: 470px;
				height: 600px;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #ffffff;
			}
			#splash.hidden {
				opacity: 0;
				transition: opacity 0.3s ease-out;
				pointer-events: none;
			}
			#splash .loader-card {
				padding: 12px;
				border-radius: 14px;
				background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
				box-shadow: 0 10px 30px -12px rgba(15, 23, 42, 0.45);
				animation: splash-fade-in 0.25s ease-out;
			}
			#splash svg {
				display: block;
				width: 44px;
				height: 44px;
			}
			#splash .pulse {
				animation: splash-qr-dot-pulse 3s ease-in-out infinite;
			}
			@keyframes splash-qr-dot-pulse {
				0%,
				100% {
					opacity: 0.12;
				}
				50% {
					opacity: 1;
				}
			}
			@keyframes splash-fade-in {
				from {
					opacity: 0;
					transform: scale(0.9);
				}
				to {
					opacity: 1;
					transform: scale(1);
				}
			}
			#root {
				display: none;
			}
			#root.ready {
				display: block;
			}
		</style>
	</head>
	<body>
		<div id="splash">
			<div class="loader-card">
				<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<rect
						x="1"
						y="1"
						width="12"
						height="12"
						rx="2.5"
						stroke="white"
						stroke-width="2"
						opacity="0.9"
					/>
					<rect x="4.5" y="4.5" width="5" height="5" rx="1.2" fill="white" opacity="0.9" />
					<rect
						x="19"
						y="1"
						width="12"
						height="12"
						rx="2.5"
						stroke="white"
						stroke-width="2"
						opacity="0.9"
					/>
					<rect x="22.5" y="4.5" width="5" height="5" rx="1.2" fill="white" opacity="0.9" />
					<rect
						x="1"
						y="19"
						width="12"
						height="12"
						rx="2.5"
						stroke="white"
						stroke-width="2"
						opacity="0.9"
					/>
					<rect x="4.5" y="22.5" width="5" height="5" rx="1.2" fill="white" opacity="0.9" />
					<rect
						class="pulse"
						x="15"
						y="15"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 0s"
					/>
					<rect
						class="pulse"
						x="21"
						y="15"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 0.2s"
					/>
					<rect
						class="pulse"
						x="27"
						y="15"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 0.4s"
					/>
					<rect
						class="pulse"
						x="15"
						y="21"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 0.6s"
					/>
					<rect
						class="pulse"
						x="21"
						y="21"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 0.8s"
					/>
					<rect
						class="pulse"
						x="15"
						y="27"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 1s"
					/>
					<rect
						class="pulse"
						x="27"
						y="21"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 1.2s"
					/>
					<rect
						class="pulse"
						x="27"
						y="27"
						width="4"
						height="4"
						rx="1"
						fill="white"
						style="animation-delay: 1.4s"
					/>
				</svg>
			</div>
		</div>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
